  deploy:
    runs-on: kubernetes #Runner on-premise
    #needs: docker-publish
    env:
      GITHUB_REPOSITORY_NAME: ${{ github.event.repository.name }}
      GITHUB_ORG: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Kubernetes
        run: | 
          cd helm 
          echo "Deploying ${GITHUB_REPOSITORY_NAME} to Kubernetes..."
          export IMAGE_TAG=${GITHUB_SHA::7}
          envsubst < values.template > values.yaml
          helm upgrade --install ${GITHUB_REPOSITORY_NAME} . --namespace  sis-${GITHUB_REF_NAME}-ms --create-namespace
          
          echo "Secret created."
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.CONTAINER_REGISTRY_PAT_GITHUB }} \
            --namespace=${NAME_SPACE} 

          echo "Domain: http://${GITHUB_REPOSITORY_NAME}.${GITHUB_REF_NAME}.${NAME_SPACE}.lab"
          echo "Domain: https://${GITHUB_REPOSITORY_NAME}.${GITHUB_REF_NAME}.${NAME_SPACE}.lab"